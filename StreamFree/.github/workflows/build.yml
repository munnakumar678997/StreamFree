name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Download gradle-wrapper.jar (binary — not stored in repo) ───────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          (
            # Fallback: bootstrap via system gradle
            sudo apt-get install -y gradle -q 2>/dev/null || true
            gradle wrapper --gradle-version 8.11.1 --distribution-type bin 2>/dev/null || true
          )

      # ── 4. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 5. Make gradlew executable ─────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Rename APK ──────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p release
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/debug/app-debug.apk \
             release/StreamFree-debug-${SHORT_SHA}.apk
          cp release/StreamFree-debug-${SHORT_SHA}.apk \
             release/StreamFree-latest.apk
          echo "APK_NAME=StreamFree-debug-${SHORT_SHA}.apk" >> $GITHUB_ENV

      # ── 8. Upload artifact (90-day retention) ─────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamFree-APK
          path: release/StreamFree-latest.apk
          retention-days: 90

      # ── 9. Delete old "latest" release ────────────────────────────────────
      - name: Delete old latest release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes || true

      # ── 10. Create new "latest" GitHub Release ────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          gh release create latest \
            --title "StreamFree Latest Build" \
            --notes "🤖 **Auto-built from commit \`${SHORT_SHA}\`** — ${TIMESTAMP}

### Install
1. Download **StreamFree-latest.apk** below ⬇️
2. Phone → Settings → **Unknown sources** → ON
3. Open APK → Install

### Ad-blocking
Innertube ANDROID client — \`adPlacements\`/\`adSlots\` silently ignored.
SponsorBlock (sponsor/intro/outro skip) included." \
            --prerelease \
            release/StreamFree-latest.apk \
            "release/${{ env.APK_NAME }}"
