name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache (speeds up repeat builds) ──────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Grant execute permission to gradlew ─────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 6. Rename APK with commit SHA for traceability ────────────────────
      - name: Rename APK
        run: |
          mkdir -p release
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/debug/app-debug.apk \
             release/StreamFree-debug-${SHORT_SHA}.apk
          # Also keep a fixed name so the README badge always points to same filename
          cp release/StreamFree-debug-${SHORT_SHA}.apk \
             release/StreamFree-latest.apk
          echo "APK_PATH=release/StreamFree-latest.apk" >> $GITHUB_ENV
          echo "APK_NAME=StreamFree-debug-${SHORT_SHA}.apk" >> $GITHUB_ENV

      # ── 7. Upload as workflow artifact (90-day retention) ─────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamFree-APK
          path: release/StreamFree-latest.apk
          retention-days: 90

      # ── 8. Delete old "latest" release & tag so we can recreate ──────────
      - name: Delete old latest release (if exists)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag --yes || true

      # ── 9. Create / update the "latest" GitHub Release ────────────────────
      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          gh release create latest \
            --title "StreamFree Latest Build" \
            --notes "🤖 **Auto-built from commit \`${SHORT_SHA}\`** on ${TIMESTAMP}

### What's inside
- **StreamFree-latest.apk** — always the most recent debug build
- Built with Gradle on Ubuntu, JDK 17

### Install
1. Download **StreamFree-latest.apk** below
2. Enable *Install from unknown sources* on your device
3. Open the APK to install

### Ad-blocking
Streams via Innertube ANDROID client — ad fields in the response are silently ignored.
SponsorBlock (sponsor/intro/outro skip) included." \
            --prerelease \
            release/StreamFree-latest.apk \
            "release/${{ env.APK_NAME }}"
