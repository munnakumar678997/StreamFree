name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StreamFree

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Gradle (auto-provisions Gradle itself, no wrapper jar needed) ──
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
          build-scan-publish: false
          cache-read-only: false

      # ── 4. Build Debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-build.log

      # ── 4b. TEMP DEBUG: push build log on failure ──────────────────────────
      - name: Upload build log on failure
        if: failure()
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "StreamFree Bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B debug-logs
          git add -f StreamFree/gradle-build.log
          git commit -m "debug: build log for ${{ github.sha }}"
          git push -f origin debug-logs

      # ── 5. Rename APK ─────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p release
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/debug/app-debug.apk \
             release/StreamFree-debug-${SHORT_SHA}.apk
          cp release/StreamFree-debug-${SHORT_SHA}.apk \
             release/StreamFree-latest.apk
          echo "APK_NAME=StreamFree-debug-${SHORT_SHA}.apk" >> $GITHUB_ENV

      # ── 6. Upload artifact (90-day retention) ─────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamFree-APK
          path: StreamFree/release/StreamFree-latest.apk
          retention-days: 90

      # ── 7. Delete old "latest" release ────────────────────────────────────
      - name: Delete old latest release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes || true

      # ── 8. Create new "latest" GitHub Release ──────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<EOF
          🤖 **Auto-built from commit \`${SHORT_SHA}\`** — ${TIMESTAMP}

          ### Install
          1. Download **StreamFree-latest.apk** below ⬇️
          2. Phone → Settings → **Unknown sources** → ON
          3. Open APK → Install

          ### Ad-blocking
          Innertube ANDROID client — \`adPlacements\`/\`adSlots\` silently ignored.
          SponsorBlock (sponsor/intro/outro skip) included.
          EOF
          gh release create latest \
            --title "StreamFree Latest Build" \
            --notes-file "$NOTES_FILE" \
            --prerelease \
            release/StreamFree-latest.apk \
            "release/${{ env.APK_NAME }}"
